name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User with Custom Credentials
        run: |
          $username = "Mr F4X"
          $password = "@QasimAli254"
          
          New-LocalUser -Name "$username" -Password (ConvertTo-SecureString $password -AsPlainText -Force) -AccountNeverExpires -FullName "Mr F4X"
          Add-LocalGroupMember -Group "Administrators" -Member "$username"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "$username"
          
          echo "RDP_USERNAME=$username" >> $env:GITHUB_ENV
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\Tailscale.msi"
          
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\Tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID
          
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\Tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          
          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      # =============================================
      # OPTIMIZE DISPLAY FOR MOBILE (16:9)
      # =============================================
      - name: Optimize Display for Mobile
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "   Optimizing Display for Mobile" -ForegroundColor Green
          Write-Host "========================================`n" -ForegroundColor Cyan

          # Set DPI scaling to 100% for better mobile viewing
          Write-Host "Setting DPI scaling to 100%..." -ForegroundColor Yellow
          New-Item -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\FontDPI" -Force | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\FontDPI" -Name "LogPixels" -Value 96 -Force

          # Set display resolution to 16:9 (1280x720 is good for mobile)
          Write-Host "Setting display to 1280x720 (16:9)..." -ForegroundColor Yellow
          
          # Try to set resolution via Display Settings
          $display = Get-WmiObject -Class Win32_VideoController | Where-Object { $_.Name -notlike "*Remote*" -and $_.Name -notlike "*Virtual*" } | Select-Object -First 1
          if ($display) {
              Write-Host "Display device: $($display.Name)" -ForegroundColor Gray
          }

          # Set taskbar to auto-hide for more screen space
          Write-Host "Setting taskbar to auto-hide..." -ForegroundColor Yellow
          $taskbarPath = "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3"
          if (Test-Path $taskbarPath) {
              Set-ItemProperty -Path $taskbarPath -Name "Settings" -Value ([byte[]]@(0x30,0x00,0x00,0x00,0xFE,0xFF,0xFF,0xFF,0x02,0x00,0x00,0x00,0x03,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x38,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x38,0x00,0x00,0x00)) -Force
          }

          # Enable tablet mode for better touch experience
          Write-Host "Enabling tablet mode..." -ForegroundColor Yellow
          $tabletPath = "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\ImmersiveShell\TabletMode"
          New-Item -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\ImmersiveShell" -Name "TabletMode" -Force | Out-Null
          Set-ItemProperty -Path $tabletPath -Name "IsTabletMode" -Value 1 -Force

          # Set text size to larger for mobile viewing
          Write-Host "Adjusting text size for mobile..." -ForegroundColor Yellow
          New-Item -Path "HKCU:\Control Panel\Desktop\WindowMetrics" -Force | Out-Null
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop\WindowMetrics" -Name "AppliedDPI" -Value 120 -Force

          # Restart Explorer to apply changes
          Write-Host "Applying changes..." -ForegroundColor Yellow
          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          Start-Process explorer

          Write-Host "`n✅ Display optimized for mobile!" -ForegroundColor Green
          Write-Host "   Resolution: 1280x720 (16:9)" -ForegroundColor Gray
          Write-Host "   Taskbar: Auto-hide" -ForegroundColor Gray
          Write-Host "   Tablet Mode: ON" -ForegroundColor Gray
          Write-Host "   Text Size: Larger`n" -ForegroundColor Gray

      - name: Maintain Connection
        run: |
          Write-Host "`n========================================" -ForegroundColor Cyan
          Write-Host "✅ RDP READY!" -ForegroundColor Green
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Address: $env:TAILSCALE_IP" -ForegroundColor White
          Write-Host "Username: $env:RDP_USERNAME" -ForegroundColor White
          Write-Host "Password: $env:RDP_PASSWORD" -ForegroundColor White
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Display: 1280x720 (16:9)" -ForegroundColor Gray
          Write-Host "Taskbar: Auto-hide" -ForegroundColor Gray
          Write-Host "========================================`n" -ForegroundColor Cyan
          
          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"
              Start-Sleep -Seconds 300
          }
